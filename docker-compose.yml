version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db  # persisted vector store
      - ./:/app/pdfs:ro             # mount repo root PDFs as read-only
    environment:
      - PDF_FOLDER=/app/pdfs
      - CHROMA_DB_PATH=/app/chroma_db
